AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Stella Quest Duel MVP serverless backend

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedPattern: "^[a-z0-9-]+$"
  AllowedOrigin:
    Type: String
    Default: http://localhost:5173

Globals:
  Function:
    Runtime: nodejs24.x
    PropagateTags: true
    Architectures:
      - x86_64
    MemorySize: 256
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref GameTable
        LOG_LEVEL: INFO
        ALLOWED_ORIGIN: !Ref AllowedOrigin
    Tags:
      Project: stella-quest-duel
      Environment: !Ref EnvironmentName
      ManagedBy: aws-sam

Resources:
  GameTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: purgeAt
        Enabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Project
          Value: stella-quest-duel
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: aws-sam

  UserPool:
    Type: AWS::Cognito::UserPool
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      UserPoolName: !Sub stella-quest-duel-${EnvironmentName}
      UserPoolTags:
        Project: stella-quest-duel
        Environment: !Ref EnvironmentName
        ManagedBy: aws-sam
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      UsernameConfiguration:
        CaseSensitive: false
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: true
          RequireUppercase: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub stella-quest-duel-web-${EnvironmentName}
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  GameHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref EnvironmentName
      FailOnWarnings: true
      PropagateTags: true
      Tags:
        Project: stella-quest-duel
        Environment: !Ref EnvironmentName
        ManagedBy: aws-sam
      DefinitionBody:
        openapi: "3.0.1"
        info:
          title: !Sub stella-quest-duel-${EnvironmentName}
          version: "1.0"
        paths: {}
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowedOrigin
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Authorization
          - Content-Type
          - Idempotency-Key
        MaxAge: 300
      DefaultRouteSettings:
        ThrottlingBurstLimit: 10
        ThrottlingRateLimit: 5
      Auth:
        DefaultAuthorizer: CognitoJwtAuthorizer
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient

  ContextRoomFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: src/handlers/context-room.handler
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt GameTable.Arn
      Events:
        GetContext:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/me/context
            Method: GET
        CreateRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/rooms
            Method: POST
        JoinRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/rooms/join
            Method: POST
            RouteSettings:
              ThrottlingBurstLimit: 5
              ThrottlingRateLimit: 2
        GetRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/rooms/{roomId}
            Method: GET
            RouteSettings:
              ThrottlingBurstLimit: 20
              ThrottlingRateLimit: 10
        LeaveRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/rooms/{roomId}/leave
            Method: POST
        StartRoom:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/rooms/{roomId}/start
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/context-room.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2024
        OutExtension:
          - .js=.cjs

  GameQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: src/handlers/game-query.handler
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt GameTable.Arn
      Events:
        GetGame:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/games/{gameId}
            Method: GET
            RouteSettings:
              ThrottlingBurstLimit: 40
              ThrottlingRateLimit: 20
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/game-query.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2024
        OutExtension:
          - .js=.cjs

  GameCommandFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend
      Handler: src/handlers/game-command.handler
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:TransactWriteItems
              Resource: !GetAtt GameTable.Arn
      Events:
        GameCommand:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/games/{gameId}/commands
            Method: POST
        Resign:
          Type: HttpApi
          Properties:
            ApiId: !Ref GameHttpApi
            Path: /v1/games/{gameId}/resign
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/handlers/game-command.ts
        Format: cjs
        Minify: true
        Sourcemap: false
        Target: es2024
        OutExtension:
          - .js=.cjs

  ContextRoomLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub /aws/lambda/${ContextRoomFunction}
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: stella-quest-duel
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: aws-sam

  GameQueryLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub /aws/lambda/${GameQueryFunction}
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: stella-quest-duel
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: aws-sam

  GameCommandLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      LogGroupName: !Sub /aws/lambda/${GameCommandFunction}
      RetentionInDays: 14
      Tags:
        - Key: Project
          Value: stella-quest-duel
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: ManagedBy
          Value: aws-sam

Outputs:
  ApiBaseUrl:
    Description: HTTP API base URL
    Value: !Sub https://${GameHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${EnvironmentName}
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  TableName:
    Value: !Ref GameTable
